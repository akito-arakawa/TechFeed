services:
  php:
    container_name: tech-php
    build: ./docker/php
    volumes:
      - ./src:/app:cached
    environment:
      APP_ENV: dev
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - appnet
    restart: unless-stopped
  
  nginx:
    container_name: tech-nginx
    image: nginx:1.18-alpine
    ports:
      - 8001:80
    volumes:
      - ./src:/app:cached
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    working_dir: /app
    depends_on:
      - php
    networks:
      - appnet
    restart: unless-stopped

  mysql:
    container_name: tech-mysql
    image: mysql:8.0
    volumes:
      - ./docker/mysql/my.cnf:/etc/mysql/mysql.conf.d/my.cnf
      - dbdata:/var/lib/mysql
    ports:
      - 3333:3306
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Tokyo
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "127.0.0.1", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 5s
      timeout: 3s
      retries: 30
    networks:
      - appnet
    restart: unless-stopped

  mysql-test:
    container_name: tech-test
    image: mysql:8.0
    volumes:
      - ./docker/mysql/my.cnf:/etc/mysql/mysql.conf.d/my.cnf
    ports:
      - 4444:3306
    environment:
      MYSQL_DATABASE: ${TEST_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      TZ: Asia/Tokyo
    networks:
      - appnet
    restart: unless-stopped
  
  mail:
    container_name: tech-mail
    image: mailhog/mailhog
    ports:
      - 8025:8025
      - 1025:1025

  cron:
    container_name: tech-cron
    build: ./docker/cron
    volumes:
      - ./src:/app
      - ./docker/cron/laravel-cron:/etc/cron.d/laravel-cron
    entrypoint: [
      "bash", "-c",
      "chmod 0644 /etc/cron.d/laravel-cron &&
      cron &&
      tail -f /var/log/cron.log"
    ]
    networks:
      - appnet  
    restart: unless-stopped

volumes:
  dbdata:
  
networks:
  appnet:
    driver: bridge
  